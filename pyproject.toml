[tool.poetry]
name = "orm-snippet"
version = "0.1.0"
description = ""
authors = ["uuip <uuip@users.noreply.github.com>"]
readme = "README.md"

[[tool.poetry.source]]
name = "aliyun"
url = "https://mirrors.aliyun.com/pypi/simple/"
priority = "default"

[tool.poetry.dependencies]
python = "^3.11"
setuptools = "*"
wheel = "*"

tzdata = { version = ">=2023.4", markers = "platform_system == 'Windows'" }
arrow = "^1.3.0"

sqlalchemy = { extras = ["asyncio"], version = "^2.0.25" }
psycopg = { extras = ["binary", "pool"], version = "^3.1.18" }
pydantic = "^2.6.0"
pydantic-settings = "^2.1.0"
factory-boy = "^3.3.0"
asyncpg = "^0.29.0"
about-time = "^4.2.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
