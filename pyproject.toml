[tool.poetry]
name = "orm-snippet"
version = "0.1.0"
description = ""
authors = ["uuip <uuip@users.noreply.github.com>"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "^3.12"

sqlalchemy = { extras = ["asyncio"], version = "^2.0.35" }
psycopg = { extras = ["binary", "pool"], version = "^3.2.2" }
pydantic = "^2.9.2"
